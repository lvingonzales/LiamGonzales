<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liam Gonzales</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=keyboard_double_arrow_down,keyboard_double_arrow_up"
    />
    <script src="./assets/js/index.js" defer></script>
  </head>
  <body>
    <div class="header">
      <span class="large">Liam</span>
      <span class="large">Gonzales</span>
    </div>

    <div class="main">
      <button class="prev btn">
        <div class="base">
          <div class="line"></div>
          <span class="material-symbols-rounded">
            keyboard_double_arrow_up
          </span>
          <div class="line"></div>
        </div>
        <div class="text-box">
          <span class="label">Previous</span>
        </div>
      </button>
      <section data-sectionIndex="1" id="intro">
        <div class="text-box">
          <h1>Web Developer, Designer</h1>
        </div>
      </section>
      <section data-sectionIndex="2" id="projects">
        <div class="placeholder-box"></div>
      </section>
      <section data-sectionIndex="3" id="contact">
        <div class="text-box">
          <h1>Web Developer, Designer</h1>
        </div>
      </section>
      <button class="next btn">
        <div class="text-box">
          <span class="label">Next</span>
        </div>
        <div class="base">
          <div class="line"></div>
          <span class="material-symbols-rounded">
            keyboard_double_arrow_down
          </span>
          <div class="line"></div>
        </div>
      </button>
    </div>
  </body>
</html>
